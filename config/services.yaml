# Service registry for Beacon (Phase 2).
#
# Each deployable service maps to a scope "side" (frontend/backend), the repo
# its code + `.release-flags/` live in, and a status endpoint that reports the
# service's currently-deployed SHA (used for fullstack cross-service checks).
#
# This generalizes the reference (which hardcoded specific service names).

services:
  demo-frontend:
    side: frontend
    repo: your-org/your-repo        # owner/name
    statusUrl: https://demo-frontend.up.railway.app/api/status
    statusShaField: version         # JSON field on the status response holding the deployed SHA

  demo-backend:
    side: backend
    repo: your-org/your-repo
    statusUrl: https://demo-backend.up.railway.app/api/status
    statusShaField: version
