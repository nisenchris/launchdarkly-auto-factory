# Drop this into your app repo (e.g. autofactory-demo) at
#   .github/workflows/auto-factory.yml
#
# Phase 1 runs automatically on every PR (opened/updated) — NO label gate.
# The agent chain runs on the Anthropic API by default (the
# `auto-factory-ai-provider` flag selects the backend; flip it to "vega" in
# LaunchDarkly to switch — no workflow change needed). With flag creation and
# code changes enabled, the flag-implementer creates a real flag, wires it into
# the code, and pushes to the PR branch; the testing agent adds tests.

name: LaunchDarkly Auto-Factory

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write        # agents wire the flag into the code and push to the PR branch
  pull-requests: write   # post the summary comment

jobs:
  auto-factory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the PR's head branch (not the detached merge ref) so the
          # agents can commit + push wiring/tests back to the PR.
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: LaunchDarkly Auto-Factory — Phase 1
        # Replace <owner> with the org/user hosting the auto-factory repo.
        uses: <owner>/launchdarkly-auto-factory/packages/phase1-resource-factory@main
        with:
          ld_sdk_key: ${{ secrets.LD_SDK_KEY }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          ld_app_project_key: ${{ vars.LD_APP_PROJECT_KEY }}   # e.g. autofactory-demo
          ld_api_key: ${{ secrets.LD_API_KEY }}
          enable_flag_creation: "true"   # create REAL flags in the app project
          enable_code_changes: "true"    # wire the flag into the code + push; add tests
          pr_branch: ${{ github.event.pull_request.head.ref }}
          graph_key: gha-auto-factory
          approval_mode: yolo
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # To run on Vega instead, set the auto-factory-ai-provider flag to "vega"
          # in LaunchDarkly and supply: vega_endpoint / vega_auth_header.
