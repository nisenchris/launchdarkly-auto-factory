name: CI

# Repo CI: guards the public boundary and typechecks the workspace.
# (This is the prototype's own CI — distinct from the Phase 1 action that
#  partners install into their repos.)

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Public-leak guard
        run: npm run check:public
      - name: Typecheck
        run: npm run typecheck
      - name: Tests
        run: npm test
      - name: Action bundle is current
        # The committed Phase 1 bundle must match source — rebuild and fail on drift.
        run: |
          npm run bundle -w @auto-factory/phase1-resource-factory
          git diff --exit-code -- packages/phase1-resource-factory/dist/action.bundle.js \
            || { echo "::error::action.bundle.js is stale — run 'npm run bundle -w @auto-factory/phase1-resource-factory' and commit."; exit 1; }
